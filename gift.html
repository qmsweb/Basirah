<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تهنئة واستلام زاجل</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            background-color: #f4f4f9;
            font-family: 'IBM Plex Sans Arabic', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .card {
            background-color: #ffffff;
            width: 100%;
            max-width: 500px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            overflow: hidden;
            text-align: center;
            border: 1px solid #e1e1e1;
        }

        .header {
            background-color: #2c3e50; /* لون داكن وفخم */
            color: #ffffff;
            padding: 30px 20px;
        }

        .header h1 {
            margin: 0;
            font-size: 24px;
            font-weight: 700;
        }

        .content {
            padding: 30px 25px;
            color: #333;
        }

        .quote {
            font-size: 16px;
            line-height: 1.8;
            color: #555;
            margin-bottom: 25px;
        }

        .highlight {
            color: #d35400; /* لون مميز للزاجل */
            font-weight: 600;
        }

        .location-box {
            background-color: #f9f9f9;
            border-radius: 12px;
            padding: 15px;
            margin: 20px 0;
            border: 1px dashed #ccc;
        }

        .location-title {
            font-weight: 700;
            margin-bottom: 5px;
            color: #2c3e50;
            font-size: 18px;
        }

        .hours-section {
            margin-top: 15px;
            font-size: 14px;
        }

        .hours-label {
            background-color: #e8f4f8;
            color: #2980b9;
            padding: 5px 12px;
            border-radius: 15px;
            font-weight: 600;
            display: inline-block;
            margin-bottom: 8px;
        }

        .hours-text {
            color: #666;
            display: block;
            margin-bottom: 4px;
        }

        .footer {
            padding: 20px;
            border-top: 1px solid #eee;
        }

        .logo {
            max-width: 150px; /* التحكم بحجم الشعار */
            height: auto;
            display: block;
            margin: 0 auto;
        }

        .closing {
            font-size: 14px;
            color: #888;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="header">
            <h1>مبارك لك النجاح</h1>
        </div>
        
        <div class="content">
            <div class="quote">
                <strong>لقد وصل صدى نجاحك إلى عنان السماء قبل أن يصلنا الخبر.</strong><br>
                نسبةٌ تليقُ بهمةٍ لا تعرفُ المستحيل، فهنيئًا لك القمة.
            </div>

            <p>
                واحتفاءً بك، <span class="highlight">لديك زاجل بانتظارك</span> تفضل باستلامه من:
            </p>

            <div class="location-box">
                <div class="location-title">📍 التسعينيات كافيه</div>
                
                <div class="hours-section">
                    <span class="hours-label">أوقات الدوام للاستلام</span>
                    <span class="hours-text">الصباح: 7:30 ص - 12:30 م</span>
                    <span class="hours-text">المساء: 3:00 م - 11:00 م</span>
                </div>
            </div>
        </div>

        <div class="footer">
            <p class="closing">كل التوفيق لك،</p>
            <img src="logo/jassim.png" alt="جاسم الفارسي" class="logo">
        </div>
    </div>

</body>
</html>
