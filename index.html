<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>شبكة بصيرة - قريباً</title>
    
    <style>
        /* إعدادات الخطوط بناءً على المسارات المحددة */
        @font-face {
            font-family: 'Thmanyah Serif';
            src: url('fonts/8/thmanyahseriftext-Black.otf') format('opentype');
            font-weight: 900;
        }

        @font-face {
            font-family: 'Thmanyah Sans';
            src: url('fonts/8/thmanyahsans-Light.otf') format('opentype');
            font-weight: 300;
        }

        @font-face {
            font-family: 'Thmanyah Sans';
            src: url('fonts/8/thmanyahsans-Regular.otf') format('opentype');
            font-weight: 400;
        }

        @font-face {
            font-family: 'Thmanyah Sans';
            src: url('fonts/8/thmanyahsans-Medium.otf') format('opentype');
            font-weight: 500;
        }

        @font-face {
            font-family: 'Thmanyah Sans';
            src: url('fonts/8/thmanyahsans-Bold.otf') format('opentype');
            font-weight: 700;
        }

        @font-face {
            font-family: 'Thmanyah Sans';
            src: url('fonts/8/thmanyahsans-Black.otf') format('opentype');
            font-weight: 900;
        }

        /* الإعدادات الأساسية والتصميم */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(180deg, #1be9d8 0%, #0cdbf0 100%);
            color: #000000;
            font-family: 'Thmanyah Sans', sans-serif;
            overflow: hidden;
        }

        .container {
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2rem;
            opacity: 0;
            transform: translateY(30px);
            transition: opacity 1.2s ease-out, transform 1.2s ease-out;
            padding: 20px;
        }

        .container.loaded {
            opacity: 1;
            transform: translateY(0);
        }

        .logo {
            max-width: 250px;
            width: 100%;
            height: auto;
            min-height: 80px; /* لحماية الـ SVG من الاختفاء إذا لم يكن له أبعاد داخلية */
            animation: pulse 3s infinite ease-in-out;
            pointer-events: none; /* لمنع التفاعل مع الكائن كملف خارجي */
        }

        h1 {
            font-family: 'Thmanyah Serif', serif;
            font-weight: 900;
            font-size: 2.8rem;
            margin: 0;
            line-height: 1.6;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px; /* المسافة بين الكلمات */
        }

        /* تنسيق الكلمات المسترسلة */
        .word {
            display: inline-block;
            opacity: 0;
            transform: scale(0.8);
            /* سيتم التحكم بالانتقال عبر الجافاسكربت */
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.03); }
            100% { transform: scale(1); }
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 2rem;
            }
            .logo {
                max-width: 200px;
            }
        }
    </style>
</head>
<body>

    <div class="container" id="main-container">
        <!-- استخدام object لدعم أكيد لملفات SVG مع صورة بديلة -->
        <object data="images/basirah-black.svg" type="image/svg+xml" class="logo">
            <img src="images/basirah-black.svg" alt="شبكة بصيرة" class="logo">
        </object>
        
        <!-- الحاوية التي ستظهر فيها الكلمات المتحركة -->
        <h1 id="animated-text"></h1>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            // تأثير الظهور التدريجي للحاوية
            const container = document.getElementById("main-container");
            setTimeout(() => {
                container.classList.add("loaded");
            }, 150);

            // إعداد تأثير الكلمات المسترسلة
            const text = "سنعود قريبًا بحلة جديدة";
            const textContainer = document.getElementById("animated-text");
            
            // تقسيم النص إلى كلمات ووضعها داخل وسوم span
            const words = text.split(" ");
            textContainer.innerHTML = words.map(w => `<span class="word">${w}</span>`).join("");
            
            const wordElements = document.querySelectorAll('.word');

            // دالة الحركة المستمرة (Loop)
            async function runTextAnimation() {
                while(true) {
                    // 1. إعادة ضبط الكلمات (إخفاء وتصغير)
                    wordElements.forEach(w => {
                        w.style.transition = "opacity 0.4s ease, transform 0.4s ease";
                        w.style.opacity = "0";
                        w.style.transform = "scale(0.8)";
                    });
                    
                    // انتظار قصير قبل بدء الاسترسال
                    await new Promise(r => setTimeout(r, 600));
                    
                    // 2. إظهار الكلمات تباعاً (تكبير ثم عودة للحجم الطبيعي)
                    for (let i = 0; i < wordElements.length; i++) {
                        // إظهار الكلمة وتكبيرها قليلاً (تأثير النبض أو الظهور)
                        wordElements[i].style.opacity = "1";
                        wordElements[i].style.transform = "scale(1.15)";
                        
                        await new Promise(r => setTimeout(r, 300));
                        
                        // إعادة الكلمة لحجمها الطبيعي
                        wordElements[i].style.transform = "scale(1)";
                        
                        // انتظار بسيط قبل الكلمة التالية
                        await new Promise(r => setTimeout(r, 150));
                    }
                    
                    // 3. بقاء النص مكتملاً بحجمه الطبيعي لفترة ليتمكن الزائر من قراءته
                    await new Promise(r => setTimeout(r, 3000));
                }
            }

            // تشغيل الحركة
            runTextAnimation();
        });
    </script>
</body>
</html>
