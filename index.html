<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>شبكة بصيرة - قريباً</title>
    
    <style>
        /* إعدادات الخطوط بناءً على المسارات المحددة */
        @font-face {
            font-family: 'Thmanyah Serif';
            src: url('fonts/8/thmanyahseriftext-Black.otf') format('opentype');
            font-weight: 900;
        }

        @font-face {
            font-family: 'Thmanyah Sans';
            src: url('fonts/8/thmanyahsans-Light.otf') format('opentype');
            font-weight: 300;
        }

        @font-face {
            font-family: 'Thmanyah Sans';
            src: url('fonts/8/thmanyahsans-Regular.otf') format('opentype');
            font-weight: 400;
        }

        @font-face {
            font-family: 'Thmanyah Sans';
            src: url('fonts/8/thmanyahsans-Medium.otf') format('opentype');
            font-weight: 500;
        }

        @font-face {
            font-family: 'Thmanyah Sans';
            src: url('fonts/8/thmanyahsans-Bold.otf') format('opentype');
            font-weight: 700;
        }

        @font-face {
            font-family: 'Thmanyah Sans';
            src: url('fonts/8/thmanyahsans-Black.otf') format('opentype');
            font-weight: 900;
        }

        /* الإعدادات الأساسية والتصميم */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(180deg, #1be9d8 0%, #0cdbf0 100%);
            color: #000000;
            font-family: 'Thmanyah Sans', sans-serif;
            overflow: hidden;
        }

        .container {
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2rem;
            opacity: 0;
            transform: translateY(30px);
            transition: opacity 1.2s ease-out, transform 1.2s ease-out;
            padding: 20px;
        }

        .container.loaded {
            opacity: 1;
            transform: translateY(0);
        }

        .logo {
            max-width: 250px;
            width: 100%;
            height: auto;
            min-height: 80px;
            animation: pulse 3s infinite ease-in-out;
            pointer-events: none; 
        }

        h1 {
            font-family: 'Thmanyah Serif', serif;
            font-weight: 900;
            font-size: 2.8rem;
            margin: 0;
            line-height: 1.6;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 12px;
        }

        /* تنسيق لتأكيد اتصال الحروف وعدم انكسارها */
        .word-group {
            display: inline;
            white-space: nowrap;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.03); }
            100% { transform: scale(1); }
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 2rem;
            }
            .logo {
                max-width: 200px;
            }
        }
    </style>
</head>
<body>

    <div class="container" id="main-container">
        <!-- استخدام object لدعم ملفات SVG -->
        <object data="images/basirah-black.svg" type="image/svg+xml" class="logo">
            <img src="images/basirah-black.svg" alt="شبكة بصيرة" class="logo">
        </object>
        
        <!-- الحاوية التي ستظهر فيها الكلمات القابلة للتمطيط -->
        <h1 id="animated-text"></h1>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            // تأثير الظهور التدريجي للحاوية عند التحميل
            const container = document.getElementById("main-container");
            setTimeout(() => {
                container.classList.add("loaded");
            }, 150);

            // إعدادات الكلمات ومواضع تمطيط الكشيدة (ـ)
            // قمنا بفصل الكلمة في الموضع القابل للاتصال
            const wordsConfig = [
                { start: "سنع", end: "ود" },
                { start: "قري", end: "بًا" },
                { start: "بحل", end: "ة" },
                { start: "جدي", end: "دة" }
            ];

            const textContainer = document.getElementById("animated-text");
            
            // بناء الهيكل الخاص بالنص بحيث لا توجد مسافات بين الحروف القابلة للاتصال
            textContainer.innerHTML = wordsConfig.map((w, index) => 
                `<span class="word-group">${w.start}<span id="kashida-${index}"></span>${w.end}</span>`
            ).join(" ");

            const maxStretch = 6; // أقصى عدد لحروف الكشيدة (طول التميط)
            const stretchSpeed = 60; // سرعة التمدد بالملي ثانية
            
            // دالة مساعدة للتوقف الزمني
            const sleep = (ms) => new Promise(resolve => setTimeout(resolve, ms));

            // دالة الحركة المستمرة
            async function runKashidaAnimation() {
                while(true) {
                    // 1. تمطيط النص كلمة كلمة
                    for (let i = 0; i < wordsConfig.length; i++) {
                        const kashidaSpan = document.getElementById(`kashida-${i}`);
                        for (let k = 1; k <= maxStretch; k++) {
                            kashidaSpan.textContent = "ـ".repeat(k);
                            await sleep(stretchSpeed);
                        }
                        // توقف بسيط بعد اكتمال تمطيط كل كلمة
                        await sleep(150); 
                    }
                    
                    // 2. بقاء النص ممتداً بالكامل لفترة ليتمكن الزائر من ملاحظته
                    await sleep(2000);
                    
                    // 3. التراجع للحجم الطبيعي بشكل سريع وسلس لجميع الكلمات معاً
                    for (let k = maxStretch; k >= 0; k--) {
                        for (let i = 0; i < wordsConfig.length; i++) {
                            const kashidaSpan = document.getElementById(`kashida-${i}`);
                            kashidaSpan.textContent = k === 0 ? "" : "ـ".repeat(k);
                        }
                        await sleep(stretchSpeed - 20); // تراجع أسرع قليلاً من التمدد
                    }
                    
                    // 4. توقف قبل إعادة بدء الحركة
                    await sleep(1500);
                }
            }

            // تشغيل حركة الاسترسال
            runKashidaAnimation();
        });
    </script>
</body>
</html>
